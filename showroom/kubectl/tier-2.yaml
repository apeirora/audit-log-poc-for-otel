# ServiceAccount for the OTel Collector Agent
# Apply namespace secrets before this manifest: task secrets:apply (kubectl/secrets.env), or see secrets.example.yaml.
#   otel-otlp-ingest-htpasswd (key: htpasswd) -> /etc/otelcol-secrets/htpasswd
#   opensearch-credentials (keys: username, password) -> OPENSEARCH_USERNAME / OPENSEARCH_PASSWORD
#   opensearch-ca-cert (key: ca.crt) -> /etc/opensearch-ca/ca.crt for TLS validation
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otelcol-agent
---
# ConfigMap containing the OTel Collector Agent configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: otelcol-agent-config
data:
  config.yaml: |
    extensions:
      file_storage:
        directory: /var/lib/otelcol/storage
        create_directory: true
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
      basicauth/server:
        htpasswd:
          file: /etc/otelcol-secrets/htpasswd
      basicauth/client:
        client_auth:
          username: ${env:OPENSEARCH_USERNAME}
          password: ${env:OPENSEARCH_PASSWORD}

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
            auth:
              authenticator: basicauth/server
          http:
            endpoint: 0.0.0.0:4318
            auth:
              authenticator: basicauth/server
      filelog/tier2:
        include:
          - /var/log/pods/tier-2_*/*/*.log
        start_at: end
        include_file_path: true
        operators:
          - type: container

    processors:
      certificatelogverify:
        hash_algorithm: SHA256
        sign_content: body
        k8s_secret:
          name: dice-java-openbao-tls
          namespace: tier-1
          cert_key: cert
      batch:
        send_batch_size: 1024
        timeout: 5s

    exporters:
      # Export logs directly to OpenSearch in namespace 'tier-3'.
      # If your OpenSearch installation requires authentication, provide username/password
      # via Kubernetes Secret and reference them using env vars in the DaemonSet below.
      opensearch:
        http:
          endpoint: https://opensearch-cluster-master.tier-3.svc.cluster.local:9200
          tls:
            ca_file: /etc/opensearch-ca/ca.crt
          auth:
            authenticator: basicauth/client
        logs_index: otel-logs
        traces_index: otel-traces
        sending_queue:
          enabled: true
          storage: file_storage
      opensearch/tier2self:
        http:
          endpoint: https://opensearch-cluster-master.tier-3.svc.cluster.local:9200
          tls:
            ca_file: /etc/opensearch-ca/ca.crt
          auth:
            authenticator: basicauth/client
        logs_index: otel-logs-tier2
        traces_index: otel-traces
        sending_queue:
          enabled: true
          storage: file_storage
      debug/logs:
        verbosity: detailed
      debug/metrics:
        verbosity: basic

    service:
      extensions: [file_storage, health_check, basicauth/server, basicauth/client]
      pipelines:
        logs:
          receivers: [otlp]
          processors: [certificatelogverify, batch]
          exporters: [opensearch, debug/logs]
        logs/tier2self:
          receivers: [filelog/tier2]
          processors: [batch]
          exporters: [opensearch/tier2self]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug/metrics]
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: "0.0.0.0"
                    port: 8888
---
# DaemonSet for deploying OTel Collector Agent on each node
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otelcol-agent
  labels:
    app: otelcol-agent
    component: otel-collector
spec:
  selector:
    matchLabels:
      app: otelcol-agent
      component: otel-collector
  template:
    metadata:
      labels:
        app: otelcol-agent
        component: otel-collector
    spec:
      serviceAccountName: otelcol-agent
      initContainers:
        - command:
            - chown
            - -R
            - "10001:0"
            - /var/lib/otelcol/storage
          image: alpine:latest
          name: storage-dir-ownership-modifier
          resources:
            limits:
              memory: 50Mi
            requests:
              cpu: 10m
              memory: 10Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - CHOWN
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - mountPath: /var/lib/otelcol/storage
              name: storage
      containers:
        - name: otel-collector
          image: ghcr.io/apeirora/otelcol-certificatelogverify:latest
          imagePullPolicy: Always
          args:
            - "--config=/etc/otelcol-contrib/config.yaml"
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: health-check
              containerPort: 13133
              protocol: TCP
          env:
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # If OpenSearch requires basic auth, you can pass credentials via env vars
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: username
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: password
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              memory: 128Mi
              cpu: 50m
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib
              readOnly: true
            - name: storage
              mountPath: /var/lib/otelcol/storage
            - name: pod-logs
              mountPath: /var/log/pods
              readOnly: true
            - name: otlp-ingest-htpasswd
              mountPath: /etc/otelcol-secrets
              readOnly: true
            - name: opensearch-ca-cert
              mountPath: /etc/opensearch-ca
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: health-check
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: health-check
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsGroup: 0
            runAsNonRoot: true
            runAsUser: 10001
      volumes:
        - name: config
          configMap:
            name: otelcol-agent-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: storage
          hostPath:
            path: /var/lib/otelcol/storage
            type: DirectoryOrCreate
        - name: otlp-ingest-htpasswd
          secret:
            secretName: otel-otlp-ingest-htpasswd
            defaultMode: 288
        - name: pod-logs
          hostPath:
            path: /var/log/pods
            type: Directory
        - name: opensearch-ca-cert
          secret:
            secretName: opensearch-ca-cert
---
# Service for the OTel Collector Agent
apiVersion: v1
kind: Service
metadata:
  name: otelcol-agent
  labels:
    app: otelcol-agent
    component: otel-collector
spec:
  type: ClusterIP
  selector:
    app: otelcol-agent
    component: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
---
# Service for OTel Collector Agent Metrics
apiVersion: v1
kind: Service
metadata:
  name: otelcol-agent-metrics
  labels:
    app: otelcol-agent
    component: otel-collector
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8888"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: otelcol-agent
    component: otel-collector
  ports:
    - name: metrics
      port: 8888
      targetPort: 8888
      protocol: TCP
