# Secrets are applied with kubectl create secret ... | kubectl apply (nothing committed).
#
# Cross-check with tier-1.yaml / tier-2.yaml:
# - tier-1 init: secret dice-java-openbao-token key token
# - tier-1 otel sidecar: secret otel-otlp-client-auth keys username, password -> OTEL_OTLP_EXPORTER_*
# - tier-2 otel: secret otel-otlp-ingest-htpasswd key htpasswd -> file /etc/otelcol-secrets/htpasswd
#   The htpasswd line MUST authenticate the same user/password as otel-otlp-client-auth (tier-1 exporter).
# - tier-2 otel OpenSearch: secret opensearch-credentials keys username, password -> OPENSEARCH_*
#
# Legacy (optional): copy this file to secrets.local.yaml (gitignored), replace REPLACE_ME, then:
#   kubectl apply -f secrets.local.yaml
# Secret sources:
# - dice-java-openbao-token.token: retrieve from OpenBao secret storage (for example: kv/data/tier-1/dice-java token field).
# - otel-otlp-client-auth.username/password: choose an OTLP basic-auth pair and store/retrieve it from OpenBao
#   (for example: kv/data/otel/otlp-client-auth with username/password fields).
# - otel-otlp-ingest-htpasswd.htpasswd: generate with htpasswd for the same username/password as otel-otlp-client-auth
#   (for example: `htpasswd -nbB otel-client strong-password`).
# - opensearch-credentials.username/password: OpenSearch ingest user credentials (for example: admin/<strong-password> for local dev),
#   preferably stored in OpenBao and injected from there.
---
apiVersion: v1
kind: Secret
metadata:
  name: dice-java-openbao-token
  namespace: tier-1
type: Opaque
stringData:
  token: REPLACE_ME # OpenBao token only: retrieve from OpenBao secret storage (example value format: s.xxxxxxxx)
---
apiVersion: v1
kind: Secret
metadata:
  name: otel-otlp-client-auth
  namespace: tier-1
type: Opaque
stringData:
  username: REPLACE_ME # OTLP basic-auth username used by tier-1 exporter (example: otel-client), stored/retrieved in OpenBao
  password: REPLACE_ME # Matching OTLP basic-auth password (example: strong-password), stored/retrieved in OpenBao
---
apiVersion: v1
kind: Secret
metadata:
  name: otel-otlp-ingest-htpasswd
  namespace: tier-2
type: Opaque
stringData:
  htpasswd: |
    REPLACE_ME_USERNAME:REPLACE_ME_PASSWORD_OR_BCRYPT_HASH # Example: otel-client:$2y$... (generated via `htpasswd -nbB otel-client strong-password`)
---
apiVersion: v1
kind: Secret
metadata:
  name: opensearch-credentials
  namespace: tier-2
type: Opaque
stringData:
  username: REPLACE_ME # OpenSearch username with index/write permissions (example local dev: admin), preferably stored/retrieved in OpenBao
  password: REPLACE_ME # Matching OpenSearch password (example local dev: admin password), preferably stored/retrieved in OpenBao
