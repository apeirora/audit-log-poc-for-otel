              "integrity_comparison": {
                "kind": "Panel",
                "spec": {
                  "display": {
                    "name": "Pipeline Integrity: Received vs Sent",
                    "description": "Compare logs at each pipeline stage - gaps indicate data loss"
                  },
                  "plugin": {
                    "kind": "TimeSeriesChart",
                    "spec": {
                      "legend": {
                        "mode": "list",
                        "position": "bottom"
                      },
                      "yAxis": {
                        "label": "total logs"
                      }
                    }
                  },
                  "queries": [
                    {
                      "kind": "TimeSeriesQuery",
                      "spec": {
                        "plugin": {
                          "kind": "PrometheusTimeSeriesQuery",
                          "spec": {
                            "query": "sum(otelcol_receiver_accepted_log_records_total{namespace=\"tier-2\"}) or vector(0)",
                            "seriesNameFormat": "Tier-2 Received",
                            "datasource": {
                              "kind": "PrometheusDatasource",
                              "name": "prometheus"
                            }
                          }
                        }
                      }
                    },
                    {
                      "kind": "TimeSeriesQuery",
                      "spec": {
                        "plugin": {
                          "kind": "PrometheusTimeSeriesQuery",
                          "spec": {
                            "query": "sum(otelcol_exporter_sent_log_records_total{namespace=\"tier-2\", exporter=\"otlp\"}) or vector(0)",
                            "seriesNameFormat": "Tier-2 Sent",
                            "datasource": {
                              "kind": "PrometheusDatasource",
                              "name": "prometheus"
                            }
                          }
                        }
                      }
                    },
                    {
                      "kind": "TimeSeriesQuery",
                      "spec": {
                        "plugin": {
                          "kind": "PrometheusTimeSeriesQuery",
                          "spec": {
                            "query": "sum(otelcol_receiver_accepted_log_records_total{namespace=\"tier-3\", job=\"kubernetes-pods\"}) or vector(0)",
                            "seriesNameFormat": "Tier-3 Received",
                            "datasource": {
                              "kind": "PrometheusDatasource",
                              "name": "prometheus"
                            }
                          }
                        }
                      }
                    }
                  ]
                }
              },
              "loss_over_time": {
                "kind": "Panel",
                "spec": {
                  "display": {
                    "name": "Data Loss Detection",
                    "description": "Difference between sent and received - should be zero for lossless delivery"
                  },
                  "plugin": {
                    "kind": "TimeSeriesChart",
                    "spec": {
                      "legend": {
                        "mode": "list",
                        "position": "bottom"
                      },
                      "yAxis": {
                        "label": "logs difference"
                      }
                    }
                  },
                  "queries": [
                    {
                      "kind": "TimeSeriesQuery",
                      "spec": {
                        "plugin": {
                          "kind": "PrometheusTimeSeriesQuery",
                          "spec": {
                            "query": "(sum(increase(otelcol_exporter_sent_log_records_total{namespace=\"tier-2\", exporter=\"otlp\"}[5m])) or vector(0)) - (sum(increase(otelcol_receiver_accepted_log_records_total{namespace=\"tier-3\", job=\"kubernetes-pods\"}[5m])) or vector(0))",
                            "seriesNameFormat": "Tier-2→Tier-3 Delta (should be ~0)",
                            "datasource": {
                              "kind": "PrometheusDatasource",
                              "name": "prometheus"
                            }
                          }
                        }
                      }
                    },
                    {
                      "kind": "TimeSeriesQuery",
                      "spec": {
                        "plugin": {
                          "kind": "PrometheusTimeSeriesQuery",
                          "spec": {
                            "query": "(sum(increase(otelcol_receiver_accepted_log_records_total{namespace=\"tier-2\"}[5m])) or vector(0)) - (sum(increase(otelcol_exporter_sent_log_records_total{namespace=\"tier-2\", exporter=\"otlp\"}[5m])) or vector(0))",
                            "seriesNameFormat": "Tier-2 In-Flight/Queued",
                            "datasource": {
                              "kind": "PrometheusDatasource",
                              "name": "prometheus"
                            }
                          }
                        }
                      }
                    }
                  ]
                }
              },
