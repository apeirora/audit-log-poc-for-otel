                    "kind": "StatChart",
                    "spec": {
                      "calculation": "last",
                      "format": {
                        "unit": "decimal"
                      },
                      "thresholds": {
                        "steps": [
                          { "color": "#22c55e", "value": 0 },
                          { "color": "#ef4444", "value": 1 }
                        ]
                      }
                    }
                  },
                  "queries": [
                    {
                      "kind": "TimeSeriesQuery",
                      "spec": {
                        "plugin": {
                          "kind": "PrometheusTimeSeriesQuery",
                          "spec": {
                            "query": "sum(otelcol_receiver_failed_log_records_total{namespace=\"tier-3\", job=\"kubernetes-pods\"}) or vector(0)",
                            "datasource": {
                              "kind": "PrometheusDatasource",
                              "name": "prometheus"
                            }
                          }
                        }
                      }
                    }
                  ]
                }
