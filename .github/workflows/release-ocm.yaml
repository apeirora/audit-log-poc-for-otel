name: Release OCM

on:
  workflow_dispatch:
    inputs:
      oci_registry:
        description: "Optional; empty = ghcr.io/<owner>/<repo> (this repo ghcr.io/apeirora/audit-log-poc-for-otel)"
        required: false
        type: string
  push:
    branches: [showroom]
    paths:
      - "showroom/ocm/**"
      - ".github/workflows/job-ocm.yaml"
      - ".github/workflows/release-ocm.yaml"
      - ".github/workflows/pr-ocm.yaml"
      - "charts/**"
      - "ocm/**"

jobs:
  ocm:
    uses: ./.github/workflows/job-ocm.yaml
    permissions:
      contents: read
      packages: write
    with:
      oci_registry: ${{ github.event.inputs.oci_registry || '' }}
      push_to_registry: "true"
    secrets: inherit
