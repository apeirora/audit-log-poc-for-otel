name: PR OCM

on:
  pull_request:
    branches: [showroom]
    paths:
      - "showroom/ocm/**"
      - ".github/workflows/job-ocm.yaml"
      - ".github/workflows/pr-ocm.yaml"
      - "charts/**"
      - "ocm/**"

concurrency:
  group: pr-ocm-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ocm:
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/job-ocm.yaml
    permissions:
      contents: read
      packages: write
      actions: write
    with:
      push_to_registry: "true"
      upload_transport_ctf: "true"
    secrets: inherit
