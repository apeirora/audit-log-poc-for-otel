apiVersion: v1
kind: Service
metadata:
  name: otelcol1
  namespace: otel-demo
spec:
  selector:
    app: otelcol1
  ports:
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otelcol1
  namespace: otel-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otelcol1
  template:
    metadata:
      labels:
        app: otelcol1
    spec:
      initContainers:
        - name: wait-for-redis
          image: redis:7.4-alpine
          command: ["sh", "-c", "until redis-cli -h redis -p 6379 PING; do echo waiting for redis; sleep 2; done"]
      containers:
        - name: otelcol
          image: apeirora/opentelemetry-collector-contrib:fixRedisStart
          args: ["--config=/etc/otelcol/config.yaml"]
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: otel-config-1
