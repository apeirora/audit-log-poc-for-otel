apiVersion: v1
kind: Namespace
metadata:
  name: otel-demo
---
apiVersion: v1
kind: Pod
metadata:
  name: nfs-server
  namespace: otel-demo
  labels:
    app: nfs-server
spec:
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 0
  containers:
    - name: nfs-server
      image: erichough/nfs-server:latest
      env:
        - name: NFS_EXPORT_0
          value: /exports *(rw,sync,no_subtree_check,no_root_squash,fsid=0)
      securityContext:
        privileged: true
      ports:
        - name: nfs
          containerPort: 2049
          protocol: TCP
        - name: nfs-udp
          containerPort: 2049
          protocol: UDP
        - name: rpcbind
          containerPort: 111
          protocol: TCP
        - name: rpcbind-udp
          containerPort: 111
          protocol: UDP
        - name: statd
          containerPort: 32765
          protocol: TCP
        - name: statd-udp
          containerPort: 32765
          protocol: UDP
        - name: mountd
          containerPort: 32767
          protocol: TCP
        - name: mountd-udp
          containerPort: 32767
          protocol: UDP
      volumeMounts:
        - name: data
          mountPath: /exports
  volumes:
    - name: data
      emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nfs-service
  namespace: otel-demo
spec:
  selector:
    app: nfs-server
  ports:
    - name: nfs
      port: 2049
      targetPort: 2049
      protocol: TCP
    - name: nfs-udp
      port: 2049
      targetPort: 2049
      protocol: UDP
    - name: rpcbind
      port: 111
      targetPort: 111
      protocol: TCP
    - name: rpcbind-udp
      port: 111
      targetPort: 111
      protocol: UDP
    - name: statd
      port: 32765
      targetPort: 32765
      protocol: TCP
    - name: statd-udp
      port: 32765
      targetPort: 32765
      protocol: UDP
    - name: mountd
      port: 32767
      targetPort: 32767
      protocol: TCP
    - name: mountd-udp
      port: 32767
      targetPort: 32767
      protocol: UDP
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: storage-data-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  nfs:
    path: /exports
    server: 10.96.229.47
  mountOptions:
    - nfsvers=3
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage-data
  namespace: otel-demo
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: nfs
---
apiVersion: v1
kind: Service
metadata:
  name: otelcol1
  namespace: otel-demo
spec:
  selector:
    app: otelcol1
  ports:
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
apiVersion: v1
kind: Service
metadata:
  name: otelcol2
  namespace: otel-demo
spec:
  selector:
    app: otelcol2
  ports:
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
apiVersion: v1
kind: Service
metadata:
  name: otelcol3
  namespace: otel-demo
spec:
  selector:
    app: otelcol3
  ports:
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-config-1
  namespace: otel-demo
data:
  config.yaml: |
    extensions:
      file_storage/c1:
        directory: /data/queue-c1
        timeout: 10s
        compaction:
          on_start: true
          on_rebound: true

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    exporters:
      otlphttp:
        endpoint: http://127.0.0.1:0
        timeout: 10s
        sending_queue:
          enabled: true
          storage: file_storage/c1

      otlphttp/block:
        endpoint: http://127.0.0.1:0
        timeout: 2s
        retry_on_failure:
          enabled: true
          max_elapsed_time: 0s
        sending_queue:
          enabled: true
          storage: file_storage/c1

    service:
      extensions: [file_storage/c1]
      pipelines:
        traces:
          receivers: [otlp]
          processors: []
          exporters: [otlphttp]
        logs:
          receivers: [otlp]
          processors: []
          exporters: [otlphttp/block]
---
